name: Daily Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Fetch backup from Second Brain
        env:
          SECOND_BRAIN_USER: sourmack
          SECOND_BRAIN_PASS: ${{ secrets.SECOND_BRAIN_PASSWORD }}
        run: |
          # Create backup directory
          mkdir -p backups/daily
          
          # Fetch full backup
          curl -s -u "$SECOND_BRAIN_USER:$SECOND_BRAIN_PASS" \
            "https://second-brain-theta-ebon.vercel.app/api/backup/full" \
            -o "backups/daily/backup-$(date +%Y-%m-%d).json"
          
          # Also create markdown export
          mkdir -p backups/memories
          
          # Extract memories from JSON and save as individual markdown files
          jq -r '.data.memories.daily[] | @base64' "backups/daily/backup-$(date +%Y-%m-%d).json" | while read -r encoded; do
            memory=$(echo "$encoded" | base64 -d)
            date=$(echo "$memory" | jq -r '.date')
            content=$(echo "$memory" | jq -r '.content')
            echo "$content" > "backups/memories/${date}.md"
          done
          
          # Save long-term memory
          jq -r '.data.memories.longTerm.content // empty' "backups/daily/backup-$(date +%Y-%m-%d).json" > "backups/MEMORY.md"
      
      - name: Commit backup
        run: |
          git config --local user.email "backup@second-brain.bot"
          git config --local user.name "Second Brain Backup Bot"
          git add backups/
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated backup - $(date +%Y-%m-%d)"
          git push
      
      - name: Cleanup old backups (keep last 30 days)
        run: |
          find backups/daily -name "*.json" -mtime +30 -delete
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Cleanup old backups"
          git push
